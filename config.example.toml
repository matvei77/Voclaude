# Voclaude configuration
# Location: %APPDATA%\voclaude\Voclaude\config\config.toml

# Hotkey to toggle recording
hotkey = "F4"

# Hotkey to toggle history window
history_hotkey = "Ctrl+Shift+H"

# Language hint. Leave commented out for auto-detect.
# Setting this biases the model toward the chosen language and noticeably
# improves accuracy for non-English speech (e.g. German, French, Portuguese).
# Accepts ISO codes ("de", "fr"), regional codes ("de-DE", "pt-BR"), or
# English names ("German", "French").
# Officially supported: en, zh, yue, de, fr, es, it, pt, ja, ko, ru, ar
# Also recognised: nl, pl, tr, sv, vi, th, id, hi
# language = "de"

# Formatting
add_trailing_space = true
capitalize_first = true

# Unload model after N seconds idle (saves VRAM).
# Model also unloads immediately after each transcription.
idle_unload_seconds = 30

# Show OS notifications
show_notifications = true

# Maximum history entries
history_max_entries = 500

# GPU acceleration (CUDA)
use_gpu = true

# Model (HuggingFace repo id, downloaded automatically on first use)
model = "Qwen/Qwen3-ASR-1.7B"

# Optional: path to local model directory (safetensors)
# model_path = "C:/models/Qwen3-ASR-1.7B"

# Max tokens per transcription
max_new_tokens = 2048

# Require GPU (fail if CUDA unavailable)
require_gpu = false
